<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Synthesis</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="voiceinator">

      <h1>The Voiceinator 5000</h1>

      <select name="voice" id="voices">
        <option value="">Select A Voice</option>
      </select>

      <label for="rate">Rate:</label>
      <input id="rate" name="rate" type="range" min="0" max="3" value="1" step="0.1">

      <label for="pitch">Pitch:</label>

      <input id="pitch" name="pitch" type="range" min="0" max="2" step="0.1">
      <textarea name="text">Hello! I love JavaScript 👍</textarea>
      <button id="stop">Stop!</button>
      <button id="speak">Speak</button>

    </div>

<script>

  const voicesDropdown = document.querySelector('[name="voice"]');
  const options = document.querySelectorAll('[type="range"], [name="text"]');
  const speakButton = document.querySelector('#speak');
  const stopButton = document.querySelector('#stop');
const rate=document.querySelector("#rate");
	const pitch=document.querySelector("#pitch");
	const text = document.querySelector('[name="text"]');
	let voices = [];
function populateVoices() {

    voices = speechSynthesis.getVoices();

    voicesDropdown.innerHTML = voices
        .map((voice) => {
            return `
                <option value="${voice.name}">
                    ${voice.name} (${voice.lang})
                </option>
            `;
        })
        .join("");
}

speechSynthesis.addEventListener(
    "voiceschanged",
    populateVoices
); 
speakButton.addEventListener("click",()=>{
const msg = new SpeechSynthesisUtterance(text.value);
	const selectedVoice = voices.find((voice) => {
        return voice.name === voicesDropdown.value;
    });

    msg.voice = selectedVoice;
	msg.pitch=pitch.value;
	msg.rate=rate.value;
	speechSynthesis.speak(msg);	
})
	

  //Your code goes here
</script>

</body>
</html>
